{{/*
Renders the KilluHub pipeline YAML as a Kubernetes ConfigMap.
The `engine:` block is injected per platform — all other pipeline keys come
directly from .Values.pipeline so users never edit platform-specific YAML.

Rendered on ALL platforms so the EKS SparkApplication can mount it.
On Databricks and EMR the rendered output is used by the CI/CD pipeline
to upload the config to DBFS / S3 before submitting the job.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "killuhub.configmapName" . }}
  namespace: {{ .Values.eks.namespace | default "default" }}
  labels:
    {{- include "killuhub.labels" . | nindent 4 }}
data:
  pipeline.yaml: |
    # Generated by KilluHub Helm chart
    # Platform: {{ .Values.platform }}
    # Release:  {{ .Release.Name }}

    type: {{ .Values.pipeline.type }}
    mode: {{ .Values.pipeline.mode | default "batch" }}

    {{- if eq (.Values.pipeline.mode | default "batch") "batch" }}
    batch:
      strategy: {{ .Values.pipeline.batch.strategy | default "incremental" }}
      watermark_column: {{ .Values.pipeline.batch.watermark_column }}
      initial_watermark: {{ .Values.pipeline.batch.initial_watermark | quote }}
    {{- end }}

    {{- if eq (.Values.pipeline.mode | default "batch") "streaming" }}
    streaming:
      trigger: {{ .Values.pipeline.streaming.trigger | default "processingTime" }}
      trigger_interval: {{ .Values.pipeline.streaming.trigger_interval | default "30 seconds" | quote }}
      checkpoint_location: {{ .Values.pipeline.streaming.checkpoint_location | quote }}
      output_mode: {{ .Values.pipeline.streaming.output_mode | default "append" }}
    {{- end }}

    {{- if eq .Values.pipeline.type "bronze" }}
    connector:
      name: {{ .Values.pipeline.connector.name }}
      {{- if and (eq (.Values.pipeline.mode | default "batch") "streaming") .Values.pipeline.connector.stream_options }}
      stream_format: {{ .Values.pipeline.connector.stream_format | default "kafka" }}
      stream_options:
        {{- .Values.pipeline.connector.stream_options | toYaml | nindent 8 }}
      {{- end }}
      config:
        {{- .Values.pipeline.connector.config | toYaml | nindent 8 }}

    bronze:
      table: {{ .Values.pipeline.bronze.table | quote }}
      source_name: {{ .Values.pipeline.bronze.source_name | quote }}
      partition_by: {{ .Values.pipeline.bronze.partition_by | default (list "_ingestion_date") | toJson }}
    {{- end }}

    {{- if eq .Values.pipeline.type "silver" }}
    silver:
      bronze_table: {{ .Values.pipeline.silver.bronze_table | quote }}
      silver_table: {{ .Values.pipeline.silver.silver_table | quote }}
      key_columns: {{ .Values.pipeline.silver.key_columns | toJson }}
      {{- if .Values.pipeline.silver.date_columns }}
      date_columns: {{ .Values.pipeline.silver.date_columns | toJson }}
      {{- end }}
      {{- if .Values.pipeline.silver.date_dimension_column }}
      date_dimension_column: {{ .Values.pipeline.silver.date_dimension_column }}
      {{- end }}
      {{- if .Values.pipeline.silver.type_map }}
      type_map:
        {{- .Values.pipeline.silver.type_map | toYaml | nindent 8 }}
      {{- end }}
      {{- if .Values.pipeline.silver.null_check_columns }}
      null_check_columns: {{ .Values.pipeline.silver.null_check_columns | toJson }}
      {{- end }}
      {{- if .Values.pipeline.silver.partition_by }}
      partition_by: {{ .Values.pipeline.silver.partition_by | toJson }}
      {{- end }}
      state_store: {{ .Values.pipeline.silver.state_store | default "json" }}
    {{- end }}

    {{- include "killuhub.engineBlock" . | nindent 4 }}

    {{- if .Values.pipeline.contract }}
    contract:
      on_violation: {{ .Values.pipeline.contract.on_violation | default "warn" }}
      {{- if .Values.pipeline.contract.min_row_count }}
      min_row_count: {{ .Values.pipeline.contract.min_row_count }}
      {{- end }}
      {{- if .Values.pipeline.contract.columns }}
      columns:
        {{- .Values.pipeline.contract.columns | toYaml | nindent 8 }}
      {{- end }}
    {{- end }}
