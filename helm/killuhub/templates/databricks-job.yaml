{{/*
Databricks Asset Bundle job definition — rendered when platform is "databricks".

This is NOT a K8s resource. It's a YAML file that the CI/CD pipeline uploads to
Databricks using the Asset Bundles CLI:

  databricks bundle deploy   (uploads the bundle)
  databricks bundle run killuhub-job   (triggers the run)

Or via the classic Jobs API:
  databricks jobs create --json <(helm template ... | yq '.spec')

The ConfigMap template also renders the pipeline YAML — your CI/CD script must
upload that rendered YAML to DBFS before running this job.
*/}}
{{- if eq .Values.platform "databricks" }}
# databricks-bundle.yaml — generated by KilluHub Helm chart
# Deploy with: databricks bundle deploy && databricks bundle run {{ .Values.job.name }}
bundle:
  name: {{ .Values.job.name }}

resources:
  jobs:
    killuhub-job:
      name: {{ .Values.job.name }}
      description: "KilluHub {{ .Values.pipeline.type }} pipeline — rendered by Helm"

      tags:
        {{- range $k, $v := .Values.job.labels }}
        {{ $k }}: {{ $v | quote }}
        {{- end }}
        pipeline_type: {{ .Values.pipeline.type | quote }}

      tasks:
        - task_key: {{ .Values.pipeline.type }}-task
          description: "{{ .Values.pipeline.type | title }} pipeline — {{ .Values.job.name }}"

          python_wheel_task:
            package_name: killuhub
            entry_point: main
            parameters:
              - "--config"
              - "/dbfs/killuhub/configs/{{ .Values.job.name }}.yaml"

          job_cluster_key: killuhub-cluster

          libraries:
            - pypi:
                package: killuhub
            {{- if eq .Values.pipeline.connector.name "postgres" }}
            - pypi:
                package: "psycopg2-binary>=2.9"
            {{- end }}
            {{- if eq .Values.pipeline.connector.name "kafka" }}
            - pypi:
                package: "confluent-kafka>=2.3"
            {{- end }}

      job_clusters:
        - job_cluster_key: killuhub-cluster
          new_cluster:
            spark_version: {{ .Values.databricks.sparkVersion | quote }}
            node_type_id: {{ .Values.databricks.nodeTypeId | quote }}

            {{- if .Values.databricks.autoscale.enabled }}
            autoscale:
              min_workers: {{ .Values.databricks.autoscale.minWorkers }}
              max_workers: {{ .Values.databricks.autoscale.maxWorkers }}
            {{- else }}
            num_workers: {{ .Values.databricks.numWorkers }}
            {{- end }}

            spark_conf:
              spark.sql.extensions: "org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions"
              spark.sql.adaptive.enabled: "true"
              spark.sql.adaptive.coalescePartitions.enabled: "true"
              {{- range $k, $v := .Values.databricks.sparkConf }}
              {{ $k }}: {{ $v | quote }}
              {{- end }}

            spark_env_vars:
              KILLUHUB_ENV: "databricks"
              CATALOG_NAME: {{ .Values.databricks.catalogName | quote }}
              WAREHOUSE_PATH: {{ .Values.databricks.warehouse | quote }}
              {{- range $k, $v := .Values.databricks.envVars }}
              {{ $k }}: {{ $v | quote }}
              {{- end }}

            aws_attributes:
              instance_profile_arn: {{ .Values.databricks.instanceProfileArn | quote }}
              availability: {{ if .Values.databricks.spotWithFallback }}"SPOT_WITH_FALLBACK"{{ else }}"ON_DEMAND"{{ end }}
              spot_bid_price_percent: 100

      {{- if .Values.databricks.schedule.enabled }}
      schedule:
        quartz_cron_expression: {{ .Values.databricks.schedule.quartzCronExpression | quote }}
        timezone_id: {{ .Values.databricks.schedule.timezoneId | quote }}
        pause_status: UNPAUSED
      {{- end }}

      {{- if .Values.job.emailOnFailure }}
      email_notifications:
        on_failure:
          {{- range .Values.job.emailOnFailure }}
          - {{ . | quote }}
          {{- end }}
      {{- end }}

      max_retries: {{ .Values.databricks.maxRetries | default 2 }}
      min_retry_interval_millis: 30000
      timeout_seconds: {{ .Values.databricks.timeoutSeconds | default 3600 }}
{{- end }}
