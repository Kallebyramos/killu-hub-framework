{{/*
AWS EMR step definition — rendered when platform is "emr".

This is NOT a K8s resource. Your CI/CD pipeline should:
  1. Render this template:  helm template killuhub ./helm/killuhub --set platform=emr
  2. Upload the rendered pipeline YAML (from configmap.yaml) to S3:
       aws s3 cp <(helm template ... configmap) s3://bucket/killuhub/configs/<job-name>.yaml
  3. Add the step to a running cluster or start a transient cluster:
       aws emr add-steps --cluster-id <id> --steps file://emr-step.json

The rendered output here is a shell script wrapper (emr-step.sh) and a JSON
step definition that can be passed directly to `aws emr add-steps`.
*/}}
{{- if eq .Values.platform "emr" }}
# emr-step.json — generated by KilluHub Helm chart
# Upload the pipeline YAML first, then add this step:
#   aws s3 cp pipeline.yaml {{ .Values.emr.configBucket }}/{{ .Values.emr.configKey }}
#   aws emr add-steps --cluster-id $CLUSTER_ID --steps file://emr-step.json
[
  {
    "Name": {{ .Values.job.name | quote }},
    "ActionOnFailure": "CONTINUE",
    "HadoopJarStep": {
      "Jar": "command-runner.jar",
      "Args": [
        "spark-submit",
        "--deploy-mode", "cluster",
        "--master", "yarn",
        "--conf", "spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions",
        "--conf", "spark.sql.catalog.{{ .Values.emr.catalogName }}=org.apache.iceberg.spark.SparkCatalog",
        "--conf", "spark.sql.catalog.{{ .Values.emr.catalogName }}.catalog-impl=org.apache.iceberg.aws.glue.GlueCatalog",
        "--conf", "spark.sql.catalog.{{ .Values.emr.catalogName }}.warehouse={{ .Values.emr.warehouse }}",
        "--conf", "spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem",
        "--conf", "spark.sql.adaptive.enabled=true",
        "--conf", "spark.sql.adaptive.coalescePartitions.enabled=true",
        {{- range .Values.emr.sparkSubmitArgs }}
        {{ . | quote }},
        {{- end }}
        "--py-files", "{{ .Values.emr.configBucket }}/killuhub.zip",
        "{{ .Values.emr.configBucket }}/main.py",
        "--config", "{{ .Values.emr.configBucket }}/{{ .Values.emr.configKey }}"
      ]
    }
  }
]
---
# emr-cluster.json — transient cluster definition (one-shot run)
# aws emr create-cluster --cli-input-json file://emr-cluster.json
{
  "Name": {{ printf "%s-cluster" .Values.job.name | quote }},
  "ReleaseLabel": {{ .Values.emr.releaseLabel | quote }},
  "Applications": [
    { "Name": "Spark" },
    { "Name": "Hadoop" }
  ],
  "Instances": {
    "MasterInstanceType": {{ .Values.emr.masterInstanceType | quote }},
    "SlaveInstanceType": {{ .Values.emr.coreInstanceType | quote }},
    "InstanceCount": {{ .Values.emr.coreInstanceCount }},
    "KeepJobFlowAliveWhenNoSteps": false,
    "TerminationProtected": false
  },
  "JobFlowRole": {{ .Values.emr.iamJobFlowRole | quote }},
  "ServiceRole": {{ .Values.emr.iamServiceRole | quote }},
  "LogUri": "{{ .Values.emr.configBucket }}/logs/",
  "Tags": [
    {{- range $k, $v := .Values.job.labels }}
    { "Key": {{ $k | quote }}, "Value": {{ $v | quote }} },
    {{- end }}
    { "Key": "pipeline_type", "Value": {{ .Values.pipeline.type | quote }} }
  ],
  "AutoTerminationPolicy": {
    "IdleTimeout": 3600
  }
}
{{- end }}
