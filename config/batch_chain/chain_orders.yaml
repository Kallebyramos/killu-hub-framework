# KilluHub — Chain pipeline: Bronze → Silver in one file
#
# Runs stages in order: bronze first, silver second.
# Both stages share the same engine block defined at the top level.
#
# Run:
#   python main.py --config config/chain_orders.yaml
#
# Dry-run (validate without executing):
#   python main.py --config config/chain_orders.yaml --dry-run

type: chain

# Shared engine config — applied to every stage that doesn't define its own.
# Each stage can override this by adding its own `engine:` block.
engine:
  name: spark
  warehouse: ${WAREHOUSE_PATH:-/tmp/killuhub-warehouse}
  catalog_name: ${CATALOG_NAME:-local}
  catalog_type: ${CATALOG_TYPE:-hadoop}

stages:

  # ── Stage 1: Bronze — ingest raw orders from Postgres ──────────────────────
  - name: bronze-orders
    type: bronze
    mode: batch          # batch | streaming

    batch:
      strategy: incremental      # full | incremental
      watermark_column: updated_at
      initial_watermark: "2024-01-01T00:00:00"

    connector:
      name: postgres
      config:
        host: ${PG_HOST:-localhost}
        port: ${PG_PORT:-5432}
        database: ${PG_DB:-shop}
        user: ${PG_USER:-postgres}
        password: ${PG_PASSWORD:-secret}
        query: >
          SELECT * FROM orders

    bronze:
      table: ${CATALOG_NAME:-local}.bronze.orders
      source_name: postgres.shop.orders
      partition_by: [_ingestion_date]

    contract:
      on_violation: warn
      min_row_count: 0
      columns:
        - name: order_id
          type: long
          nullable: false
        - name: customer_id
          type: long
          nullable: false
        - name: amount
          type: double
          nullable: false

  # ── Stage 2: Silver — clean and deduplicate bronze orders ──────────────────
  - name: silver-orders
    type: silver
    mode: batch

    batch:
      strategy: incremental      # full | incremental
      watermark_column: _ingested_at
      initial_watermark: "1970-01-01T00:00:00"

    silver:
      # bronze_table is auto-injected from the bronze stage above
      silver_table: ${CATALOG_NAME:-local}.silver.orders

      key_columns: [order_id]

      date_columns: [created_at, updated_at]
      date_dimension_column: created_at

      type_map:
        amount: double
        quantity: int

      drop_columns: [_batch_id]
      null_check_columns: [order_id, customer_id]
      partition_by: [created_date]
      state_store: json          # json | iceberg

    contract:
      on_violation: fail
      min_row_count: 0
      columns:
        - name: order_id
          type: long
          nullable: false
        - name: customer_id
          type: long
          nullable: false
        - name: amount
          type: double
          nullable: false
          min_value: 0
        - name: status
          type: string
          nullable: false
          allowed_values: [pending, paid, shipped, cancelled, refunded]
        - name: created_at
          type: timestamp
          nullable: false
        - name: _processed_at
          type: timestamp
          nullable: false
